<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebGPU Cubes — nimconf26</title>
    <style>
      body {
        margin: 0;
        background: #111;
        color: #ddd;
        font-family: monospace;
      }
      h1 {
        font-size: 1rem;
        padding: 0.75rem 1rem 0;
      }
      #cubes-canvas {
        display: block;
        margin: 1rem auto;
        background: #000;
        width: 960px;
        height: 540px;
      }
      #output {
        white-space: pre-wrap;
        padding: 0 1rem 1rem;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <h1>WebGPU Cubes — nimconf26</h1>
    <canvas id="cubes-canvas" width="1920" height="1080"></canvas>
    <pre id="output"></pre>

    <script>
      var Module = {
        canvas: document.getElementById("cubes-canvas"),
        print: function (text) {
          document.getElementById("output").textContent += text + "\n";
          console.log(text);
        },
        printErr: function (text) {
          console.error(text);
        },
      };

      window.__mx = 0;
      window.__my = 0;
      Module.canvas.addEventListener("mousemove", function (e) {
        var r = Module.canvas.getBoundingClientRect();
        window.__mx = ((e.clientX - r.left) / r.width) * 2 - 1;
        window.__my = -(((e.clientY - r.top) / r.height) * 2 - 1);
      });
    </script>
    <script src="build/cubes.js"></script>
  </body>
</html>
